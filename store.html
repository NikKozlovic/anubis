<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store | Anubis Underground</title>
  <meta name="description" content="Official Anubis Underground store. Explore merchandise and support independent Slovenian underground music culture.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Store | Anubis Underground">
  <meta property="og:description" content="Official merchandise from Anubis Underground.">
  <meta property="og:image" content="Media/Logo/logoblack.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Store | Anubis Underground">
  <meta name="twitter:description" content="Official merchandise from Anubis Underground.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="Media/Logo/logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="Media/Logo/logo.png">
  <script src="clean-urls.js"></script>
  <script src="script.js"></script>
  <style>
    .coming-soon-wrap {
      min-height: calc(100vh - 90px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 42, 42, 0.18), transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(255, 90, 0, 0.12), transparent 42%),
        linear-gradient(145deg, #090909 0%, #121212 45%, #0b0b0b 100%);
    }

    .coming-soon-wrap::before,
    .coming-soon-wrap::after {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(255, 42, 42, 0.22);
      filter: blur(2px);
      pointer-events: none;
    }

    .coming-soon-wrap::before {
      top: -180px;
      right: -120px;
      animation: floatA 10s ease-in-out infinite;
    }

    .coming-soon-wrap::after {
      bottom: -200px;
      left: -140px;
      animation: floatB 12s ease-in-out infinite;
    }

    .coming-soon-card {
      width: min(860px, 100%);
      border: 1px solid rgba(255, 42, 42, 0.35);
      border-radius: 18px;
      background: rgba(10, 10, 10, 0.78);
      backdrop-filter: blur(8px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      text-align: center;
      padding: 48px 28px;
      position: relative;
      z-index: 1;
    }

    .coming-soon-kicker {
      display: inline-block;
      letter-spacing: 0.18em;
      font-size: 0.76rem;
      text-transform: uppercase;
      color: #ff7f5a;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .coming-soon-title {
      margin: 0;
      color: #ffffff;
      text-transform: uppercase;
      line-height: 1;
      font-size: clamp(2.1rem, 9vw, 5rem);
      letter-spacing: 0.04em;
      text-shadow: 0 0 18px rgba(255, 42, 42, 0.22);
    }

    .coming-soon-title .accent {
      color: #ff2a2a;
    }

    .coming-soon-copy {
      margin: 22px auto 0;
      max-width: 640px;
      color: #d5d5d5;
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.7;
    }

    .coming-soon-pulse {
      margin: 26px auto 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ff2a2a;
      box-shadow: 0 0 0 rgba(255, 42, 42, 0.5);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0.55); }
      70% { box-shadow: 0 0 0 20px rgba(255, 42, 42, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0); }
    }

    @keyframes floatA {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(14px); }
    }

    @keyframes floatB {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }
  </style>
</head>
<body>

    <div id="shared-navbar-root"></div>

  <main class="coming-soon-wrap">
    <section class="coming-soon-card" aria-labelledby="coming-soon-title">
      <span class="coming-soon-kicker">Anubis Underground Merch</span>
      <h1 id="coming-soon-title" class="coming-soon-title">
        Store <span class="accent">Coming Soon</span>
      </h1>
      <p class="coming-soon-copy">
        The official drop is being prepared. New pieces, limited quantities, and new designs are on the way.
      </p>
      <div class="coming-soon-pulse" aria-hidden="true"></div>
    </section>
  </main>

  <div id="shared-footer-root"></div>

</body>
</html>
