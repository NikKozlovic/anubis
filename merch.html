<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merch | Anubis Underground</title>
  <meta name="description" content="Browse official Anubis Underground merch and support the underground scene.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Merch | Anubis Underground">
  <meta property="og:description" content="Official Anubis Underground merchandise.">
  <meta property="og:image" content="Media/Logo/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Merch | Anubis Underground">
  <meta name="twitter:description" content="Official Anubis Underground merchandise.">
  <link rel="stylesheet" href="style2.css">
  <link rel="icon" href="Media/Logo/logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="Media/Logo/logo.png">
  <script src="clean-urls.js"></script>
  <script src="script.js"></script>
</head>
<body>

    <div id="shared-navbar-root"></div>


  <main>
    <div id="merch-products"></div>
  </main>


<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];

function slugify(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function changeQuantity(id, delta, maxQuantity = 3) {
  const quantityElement = document.getElementById(id);
  if (!quantityElement) return;

  let currentQuantity = parseInt(quantityElement.textContent) || 1;
  let newQuantity = currentQuantity + delta;
  
  // Keep quantity in allowed range for each product.
  if (newQuantity < 1) newQuantity = 1;
  if (newQuantity > maxQuantity) newQuantity = maxQuantity;
  
  quantityElement.textContent = newQuantity;
}

function addToCart(name, price, size, quantity, buttonElement, defaultButtonText = 'Add to Cart') {
  // Add items based on quantity
  for (let i = 0; i < quantity; i++) {
    cart.push({ name, price, size });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  
  if (!buttonElement) return;

  // Button animation
  buttonElement.textContent = 'Added!';
  buttonElement.style.backgroundColor = '#00cc00';
  buttonElement.style.pointerEvents = 'none';
  
  setTimeout(() => {
    buttonElement.textContent = defaultButtonText;
    buttonElement.style.backgroundColor = '#ff2a2a';
    buttonElement.style.pointerEvents = 'auto';
  }, 1000);
}

function createProductCard(product) {
  const safeIdBase = slugify(product.id || product.name || 'product');
  const quantityId = `quantity-${safeIdBase}`;
  const sizeGroupName = `size-${safeIdBase}`;
  const sizes = Array.isArray(product.sizes) && product.sizes.length ? product.sizes : ['One Size'];
  const defaultSize = sizes.includes(product.defaultSize) ? product.defaultSize : sizes[0];
  const maxQuantity = Number(product.maxQuantity) > 0 ? Number(product.maxQuantity) : 3;
  const buttonText = product.buttonText || 'Add to Cart';

  const card = document.createElement('div');
  card.className = 'product';

  const img = document.createElement('img');
  img.src = product.image;
  img.alt = product.imageAlt || product.name;
  img.style.maxWidth = '300px';
  img.style.width = '100%';
  img.style.height = 'auto';

  const title = document.createElement('h3');
  title.textContent = product.name;

  const price = document.createElement('p');
  price.textContent = `$${product.price}`;

  const sizeGroup = document.createElement('div');
  sizeGroup.className = 'size-group';
  sizeGroup.setAttribute('role', 'radiogroup');
  sizeGroup.setAttribute('aria-label', 'Size');

  sizes.forEach((sizeValue) => {
    const optionId = `size-${safeIdBase}-${slugify(sizeValue)}`;

    const input = document.createElement('input');
    input.className = 'size-option';
    input.type = 'radio';
    input.name = sizeGroupName;
    input.id = optionId;
    input.value = sizeValue;
    input.checked = sizeValue === defaultSize;

    const label = document.createElement('label');
    label.className = 'size-pill';
    label.setAttribute('for', optionId);
    label.textContent = sizeValue;

    sizeGroup.appendChild(input);
    sizeGroup.appendChild(label);
  });

  const quantityWrap = document.createElement('div');
  quantityWrap.style.margin = '15px 0';
  quantityWrap.style.display = 'flex';
  quantityWrap.style.alignItems = 'center';
  quantityWrap.style.justifyContent = 'center';
  quantityWrap.style.gap = '15px';

  const minusBtn = document.createElement('button');
  minusBtn.type = 'button';
  minusBtn.className = 'quantity-btn';
  minusBtn.textContent = '-';
  minusBtn.addEventListener('click', () => changeQuantity(quantityId, -1, maxQuantity));

  const quantityText = document.createElement('span');
  quantityText.id = quantityId;
  quantityText.style.color = '#fff';
  quantityText.style.fontSize = '20px';
  quantityText.style.fontWeight = '700';
  quantityText.style.minWidth = '30px';
  quantityText.style.textAlign = 'center';
  quantityText.textContent = '1';

  const plusBtn = document.createElement('button');
  plusBtn.type = 'button';
  plusBtn.className = 'quantity-btn';
  plusBtn.textContent = '+';
  plusBtn.addEventListener('click', () => changeQuantity(quantityId, 1, maxQuantity));

  quantityWrap.appendChild(minusBtn);
  quantityWrap.appendChild(quantityText);
  quantityWrap.appendChild(plusBtn);

  const addButton = document.createElement('button');
  addButton.type = 'button';
  addButton.textContent = buttonText;
  addButton.style.padding = '12px 30px';
  addButton.style.backgroundColor = '#ff2a2a';
  addButton.style.color = 'white';
  addButton.style.border = 'none';
  addButton.style.cursor = 'pointer';
  addButton.style.borderRadius = '5px';
  addButton.style.fontSize = '16px';
  addButton.style.fontWeight = '600';
  addButton.style.transition = 'all 0.3s ease';

  addButton.addEventListener('click', () => {
    const selectedSize = (document.querySelector(`input[name="${sizeGroupName}"]:checked`) || {}).value || defaultSize;
    const quantity = parseInt(document.getElementById(quantityId)?.textContent, 10) || 1;
    addToCart(product.name, Number(product.price), selectedSize, quantity, addButton, buttonText);
  });

  card.appendChild(img);
  card.appendChild(title);
  card.appendChild(price);
  card.appendChild(sizeGroup);
  card.appendChild(quantityWrap);
  card.appendChild(addButton);

  return card;
}

async function renderMerchFromJson() {
  const container = document.getElementById('merch-products');
  if (!container) return;

  try {
    const response = await fetch('merch.json');
    if (!response.ok) throw new Error('Failed to load merch.json');

    const products = await response.json();
    if (!Array.isArray(products) || products.length === 0) {
      container.innerHTML = '<p style="color: white; text-align: center;">No products available right now.</p>';
      return;
    }

    container.innerHTML = '';
    products.forEach((product) => {
      container.appendChild(createProductCard(product));
    });
  } catch (error) {
    console.error('Could not load merch.json', error);
    container.innerHTML = '<p style="color: white; text-align: center;">Could not load products. Please refresh the page.</p>';
  }
}

function updateCartCount() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const cartBadge = document.getElementById('cart-count');
  if (cartBadge) {
    cartBadge.textContent = cart.length;
  }
}

// Render products and update cart count on page load.
document.addEventListener('DOMContentLoaded', () => {
  updateCartCount();
  renderMerchFromJson();
});
</script>
 


<div id="shared-footer-root"></div>
  
</body>
</html>
