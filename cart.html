<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anubis Underground</title>
  <link rel="stylesheet" href="style2.css">
  <link rel="icon" href="Media/Logo/logo.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="Media/Logo/logo.png">
  <script src="clean-urls.js"></script>
  <script src="script.js"></script>
</head>
<body>

    <div id="shared-navbar-root"></div>


<main class="cart-container" style="max-width: 800px; margin: 100px auto; padding: 20px; text-align: center;">
  <h2 style="color: white; margin-bottom: 30px;">Your Cart</h2>
  <div id="cart-items"></div>
  <h3 id="cart-total" style="color: white; margin-top: 30px;"></h3>
  
  <div class="cart-actions" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap;">
    <button class="btn-back" onclick="window.location.href='merch.html'" style="padding: 12px 30px; background-color: #1a1a1a; color: white; border: 2px solid #ff2a2a; cursor: pointer; border-radius: 5px; font-size: 16px; font-weight: 600;">← Back to Store</button>
    <button class="btn-checkout" onclick="proceedToCheckout()" style="padding: 12px 30px; background-color: #ff2a2a; color: white; border: none; cursor: pointer; border-radius: 5px; font-size: 16px; font-weight: 600;">Proceed to Checkout</button>
    <button class="btn-clear" onclick="clearCart()" style="padding: 12px 30px; background-color: #333; color: white; border: 1px solid #666; cursor: pointer; border-radius: 5px; font-size: 16px;">Clear Cart</button>
  </div>
</main>

<script>
function displayCart() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let cartItemsDiv = document.getElementById('cart-items');
  let cartTotalDiv = document.getElementById('cart-total');
  
  if (cart.length === 0) {
    cartItemsDiv.innerHTML = '<p style="color: white;">Your cart is empty.</p>';
    cartTotalDiv.innerHTML = '';
    return;
  }
  
  let html = '';
  let total = 0;
  
  cart.forEach((item, index) => {
    total += item.price;
    html += `
      <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; margin:10px 0; background:#1a1a1a; border-radius:5px;">
        <span style="color:white;">${item.name} — Size: ${item.size || 'N/A'} — $${item.price}</span>
        <button onclick="removeItem(${index})" style="padding:5px 15px; background:#ff0000; color:white; border:none; cursor:pointer; border-radius:5px;">Remove</button>
      </div>
    `;
  });
  
  cartItemsDiv.innerHTML = html;
  cartTotalDiv.innerHTML = `Total: $${total}`;
}

function removeItem(index) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
  displayCart();
}

// Two-step confirmation (no pop-up)
function clearCart() {
  const btn = document.querySelector('button[onclick="clearCart()"]');

  // First click -> ask to confirm
  if (!clearCart._confirming) {
    clearCart._confirming = true;
    if (btn) {
      btn.dataset.originalText = btn.dataset.originalText || btn.textContent;
      btn.textContent = 'Confirm clear';
      btn.style.backgroundColor = '#b91c1c';
      btn.classList.add('btn-pulse');
    }
    showToast('Click again to clear your cart', 'error');

    clearTimeout(clearCart._timer);
    clearCart._timer = setTimeout(() => {
      // Revert if no second click in 3s
      if (btn) {
        btn.textContent = btn.dataset.originalText || 'Clear Cart';
        btn.style.backgroundColor = '#333';
        btn.classList.remove('btn-pulse');
      }
      clearCart._confirming = false;
    }, 3000);
    return;
  }

  // Second click -> clear
  localStorage.removeItem('cart');
  displayCart();

  if (btn) {
    btn.textContent = 'Cleared ✓';
    btn.style.backgroundColor = '#198754';
    btn.classList.remove('btn-pulse');
    setTimeout(() => {
      btn.textContent = btn.dataset.originalText || 'Clear Cart';
      btn.style.backgroundColor = '#333';
    }, 1200);
  }
  clearCart._confirming = false;
  clearTimeout(clearCart._timer);
  showToast('Cart cleared');
}

function proceedToCheckout() {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  if (cart.length === 0) {
    showToast('Your cart is empty! Add items before checking out.', 'error');
    return;
  }
  window.location.href = 'checkout.html';
}

function showToast(message, type = 'success') {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = message;
  t.classList.toggle('error', type === 'error');
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

displayCart();
</script>

<!-- toast container -->
<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="shared-footer-root"></div>
  
</body>
</html>
